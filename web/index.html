<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Marginalia — riscopri i tuoi highlight Kindle">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Marginalia">
  <meta name="theme-color" content="#7C3AED">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="favicon.png">
  <title>Marginalia</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #1a0533 0%, #2d1060 50%, #0f0a1e 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden;
    }

    /* ── Sfondo decorativo ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 20% 30%, rgba(124,58,237,0.25) 0%, transparent 70%),
        radial-gradient(ellipse 40% 50% at 80% 70%, rgba(139,92,246,0.15) 0%, transparent 70%);
      pointer-events: none;
    }

    /* ── Frame esterno telefono ── */
    .phone-frame {
      position: relative;
      width: 393px;
      height: 852px;
      background: #0a0a0a;
      border-radius: 54px;
      box-shadow:
        0 0 0 2px #2a2a2a,
        0 0 0 6px #1a1a1a,
        0 40px 80px rgba(0,0,0,0.8),
        0 20px 40px rgba(0,0,0,0.5),
        inset 0 0 0 1px rgba(255,255,255,0.08);
      display: flex;
      flex-direction: column;
      align-items: center;
      flex-shrink: 0;
    }

    /* Pulsanti laterali */
    .phone-frame::before {
      content: '';
      position: absolute;
      left: -4px;
      top: 130px;
      width: 4px;
      height: 36px;
      background: #1e1e1e;
      border-radius: 3px 0 0 3px;
      box-shadow: 0 52px 0 #1e1e1e, 0 100px 0 #1e1e1e;
    }
    .phone-frame::after {
      content: '';
      position: absolute;
      right: -4px;
      top: 174px;
      width: 4px;
      height: 68px;
      background: #1e1e1e;
      border-radius: 0 3px 3px 0;
    }

    /* ── Schermo ── */
    .phone-screen {
      position: relative;
      width: 361px;
      height: 780px;
      margin-top: 14px;
      border-radius: 44px;
      overflow: hidden;
      background: #F9F8F5;
    }

    /* ── Dynamic Island ── */
    .dynamic-island {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      height: 34px;
      background: #000;
      border-radius: 20px;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding-right: 12px;
      gap: 6px;
    }
    .dynamic-island::after {
      content: '';
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #2a4a2a, #0d1f0d);
      box-shadow: 0 0 4px rgba(0,200,0,0.3);
    }

    /* ── Flutter canvas ── */
    flutter-view,
    flt-glass-pane,
    #flutter-app {
      width: 100% !important;
      height: 100% !important;
    }

    /* Status bar overlay sopra il canvas */
    .status-bar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 52px;
      z-index: 5;
      display: flex;
      align-items: flex-start;
      padding: 14px 20px 0;
      justify-content: space-between;
      pointer-events: none;
    }
    .status-time {
      font-size: 15px;
      font-weight: 700;
      color: #09090B;
      letter-spacing: -0.3px;
    }
    .status-icons {
      display: flex;
      align-items: center;
      gap: 6px;
      color: #09090B;
    }
    .status-icons svg {
      width: 16px;
      height: 16px;
      fill: currentColor;
    }

    /* ── Label sotto il telefono ── */
    .phone-label {
      position: absolute;
      bottom: -44px;
      left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
      font-size: 12px;
      font-weight: 600;
      color: rgba(255,255,255,0.35);
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    /* Responsive: su schermi piccoli mostra normale */
    @media (max-width: 500px), (max-height: 900px) {
      body {
        background: #F9F8F5;
        align-items: flex-start;
        overflow: auto;
      }
      body::before { display: none; }
      .phone-frame {
        width: 100vw;
        height: 100vh;
        border-radius: 0;
        box-shadow: none;
        background: transparent;
      }
      .phone-frame::before,
      .phone-frame::after { display: none; }
      .phone-screen {
        width: 100%;
        height: 100%;
        margin-top: 0;
        border-radius: 0;
      }
      .dynamic-island,
      .status-bar,
      .phone-label { display: none; }
    }
  </style>
</head>
<body>
  <div class="phone-frame">
    <div class="phone-screen">
      <!-- Dynamic Island -->
      <div class="dynamic-island"></div>

      <!-- Status bar -->
      <div class="status-bar">
        <span class="status-time" id="status-time">9:41</span>
        <div class="status-icons">
          <!-- Signal -->
          <svg viewBox="0 0 17 12"><rect x="0" y="6" width="3" height="6" rx="1"/><rect x="4.5" y="4" width="3" height="8" rx="1"/><rect x="9" y="2" width="3" height="10" rx="1"/><rect x="13.5" y="0" width="3" height="12" rx="1"/></svg>
          <!-- WiFi -->
          <svg viewBox="0 0 16 12"><path d="M8 10.5a1.5 1.5 0 1 1 0 0.001zM1.5 5C3.4 3.2 5.6 2 8 2s4.6 1.2 6.5 3l1.5-1.5C13.7 1.4 11 0 8 0S2.3 1.4 0 3.5zm2.5 2.5C5 6 6.4 5.2 8 5.2s3 .8 4 2.3l1.5-1.5C12 4.1 10.1 3 8 3S4 4.1 2.5 6z"/></svg>
          <!-- Battery -->
          <svg viewBox="0 0 25 12">
            <rect x="0" y="1" width="21" height="10" rx="3" stroke="currentColor" stroke-width="1.5" fill="none"/>
            <rect x="1.5" y="2.5" width="17" height="7" rx="1.5" fill="currentColor"/>
            <path d="M22.5 4v4a2 2 0 0 0 0-4z" fill="currentColor"/>
          </svg>
        </div>
      </div>

      <!-- Flutter app -->
      <div id="flutter-app" style="position:absolute;inset:0;"></div>
    </div>
    <div class="phone-label">Marginalia • iOS Preview</div>
  </div>

  <script>
    // Aggiorna l'ora nella status bar
    function updateTime() {
      const now = new Date();
      const h = now.getHours().toString().padStart(2, '0');
      const m = now.getMinutes().toString().padStart(2, '0');
      const el = document.getElementById('status-time');
      if (el) el.textContent = h + ':' + m;
    }
    updateTime();
    setInterval(updateTime, 30000);
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
