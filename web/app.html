  <script>
    // Derive base href dynamically so $FLUTTER_BASE_HREF substitution is not needed
    (function() {
      var href = window.location.href;
      var base = href.substring(0, href.lastIndexOf('/') + 1);
      var el = document.createElement('base');
      el.href = base;
      document.head.insertBefore(el, document.head.firstChild);
    })();
  </script>

    html, body {
      margin: 0;
      padding: 0;

      height: 100%;
      overflow: hidden;
